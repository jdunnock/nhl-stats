<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NHL Player Stats</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      h1 { margin-bottom: 12px; }
      .controls { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin-bottom: 16px; }
      label { display: flex; flex-direction: column; gap: 4px; font-size: 14px; }
      select, input, button { padding: 8px; font-size: 14px; }
      button { cursor: pointer; }
      .upload-box { border: 2px dashed #aaa; padding: 14px; margin-bottom: 16px; }
      .upload-box.dragover { border-color: #444; background: #f8f8f8; }
      #status { margin: 12px 0; font-size: 14px; }
      .legend { margin: 8px 0 14px; font-size: 13px; display: flex; gap: 10px; flex-wrap: wrap; }
      .legend span { border: 1px solid #ccc; padding: 4px 8px; border-radius: 4px; }
      .legend .exact { background: #eefbea; }
      .legend .fallback { background: #fff8e8; }
      .legend .fuzzy { background: #fff2e5; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
      th { background: #f4f4f4; }
      tr.error-row { background: #fff4f4; }
      tr.match-exact-row { background: #eefbea; }
      tr.match-fallback-row { background: #fff8e8; }
      tr.match-fuzzy-row { background: #fff2e5; }
    </style>
  </head>
  <body>
    <h1>NHL pelaajatilastot (Excel → API)</h1>
    <div style="margin-bottom:12px;"><a href="/snapshot.html">Avaa päivämääräsnapshot-sivu</a></div>

    <div id="uploadBox" class="upload-box">
      <div style="margin-bottom:8px;">Vedä Excel tähän tai valitse tiedosto:</div>
      <input id="uploadInput" type="file" accept=".xlsx,.xls" />
      <button id="uploadBtn" type="button">Lataa tiedosto</button>
    </div>

    <div class="controls">
      <label>
        Excel-tiedosto (projekti tai data-kansio)
        <select id="fileSelect"></select>
      </label>

      <label>
        Kausi (seasonId)
        <input id="seasonInput" value="20252026" />
      </label>

      <button id="loadBtn">Hae tilastot</button>
    </div>

    <div id="status">Ladataan tiedostoja…</div>

    <div class="legend">
      <span class="exact">Exact match</span>
      <span class="fallback">Team fallback</span>
      <span class="fuzzy">Fuzzy fallback</span>
    </div>

    <table>
      <thead>
        <tr>
          <th>Rivi</th>
          <th>Pelaaja</th>
          <th>Input team</th>
          <th>Team</th>
          <th>Active</th>
          <th>GP</th>
          <th>G</th>
          <th>A</th>
          <th>P</th>
          <th>Match</th>
          <th>Status</th>
          <th>Virhe</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <script type="module" src="/app.js"></script>
  </body>
</html>
