<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NHL Snapshot by Date</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      .controls { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin: 12px 0 16px; }
      label { display: flex; flex-direction: column; gap: 4px; font-size: 14px; }
      select, input, button { padding: 8px; font-size: 14px; }
      button { cursor: pointer; }
      #status { margin: 12px 0; font-size: 14px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
      th { background: #f4f4f4; }
      tr.error-row { background: #fff4f4; }
    </style>
  </head>
  <body>
    <h1>Pistetilanne valittuna päivänä</h1>
    <div style="margin-bottom:12px;"><a href="/">← Takaisin pääsivulle</a></div>

    <div class="controls">
      <label>
        Excel-tiedosto
        <select id="fileSelect"></select>
      </label>

      <label>
        Päivämäärä
        <input id="dateInput" type="date" value="2026-01-01" />
      </label>

      <label>
        Kausi
        <input id="seasonInput" value="20252026" />
      </label>

      <button id="loadBtn">Hae snapshot</button>
    </div>

    <div id="status">Ladataan tiedostoja…</div>

    <table>
      <thead>
        <tr>
          <th>Rivi</th>
          <th>Pelaaja</th>
          <th>Input team</th>
          <th>Team</th>
          <th>GP (asti päivä)</th>
          <th>G</th>
          <th>A</th>
          <th>P</th>
          <th>Status</th>
          <th>Virhe</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <script type="module" src="/snapshot.js"></script>
  </body>
</html>
