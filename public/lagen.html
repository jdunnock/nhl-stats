<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lagen</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        background: linear-gradient(180deg, #f6f8fb 0%, #eef2f8 100%);
        color: #132033;
      }

      .page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 28px 20px 36px;
      }

      .top-nav {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .top-nav a {
        text-decoration: none;
        border: 1px solid #cfd7e3;
        padding: 6px 10px;
        border-radius: 6px;
        color: #1b2a41;
        font-size: 14px;
      }

      .top-nav a.active {
        background: #1b2a41;
        color: #fff;
        border-color: #1b2a41;
        font-weight: 600;
      }

      .hero {
        background: #ffffff;
        border-radius: 14px;
        border: 1px solid #d8e1ee;
        padding: 18px 20px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .subtitle {
        margin: 0;
        font-size: 14px;
        color: #4b5870;
      }

      .meta {
        margin-top: 12px;
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        font-size: 13px;
        color: #3f4d65;
      }

      .hidden {
        display: none;
      }

      #status {
        margin: 0;
        font-size: 13px;
      }

      .table-wrap {
        border-radius: 14px;
        overflow: auto;
        border: 1px solid #d8e1ee;
        background: #fff;
      }

      .mobile-cards {
        display: none;
      }

      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 980px;
      }

      thead tr:first-child th {
        background: #182a45;
        color: #fff;
        border-bottom: 1px solid #2f4465;
        font-size: 13px;
        letter-spacing: 0.02em;
      }

      thead tr:nth-child(2) th {
        background: #edf2fb;
        color: #1d2c43;
        font-size: 12px;
      }

      th,
      td {
        border: 1px solid #e2e8f2;
        padding: 9px 10px;
        text-align: left;
        font-size: 13px;
        vertical-align: middle;
      }

      td.points {
        width: 82px;
        text-align: right;
        font-weight: 600;
      }

      td.player {
        min-width: 170px;
      }

      td.empty {
        color: #8a93a3;
      }

      td.not-found {
        background: #fff4f4;
      }

      tr.total-row td {
        font-weight: 700;
        background: #f2f6fc;
      }

      @media (max-width: 900px) {
        .table-wrap {
          display: none;
        }

        .mobile-cards {
          display: block;
        }

        .mobile-cards-track {
          display: flex;
          gap: 12px;
          overflow-x: auto;
          padding-bottom: 8px;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
        }

        .mobile-cards-track::-webkit-scrollbar {
          height: 8px;
        }

        .mobile-cards-track::-webkit-scrollbar-thumb {
          background: #b9c5d8;
          border-radius: 999px;
        }

        .participant-card {
          scroll-snap-align: start;
          flex: 0 0 min(86vw, 420px);
          border: 1px solid #d8e1ee;
          border-radius: 14px;
          background: #fff;
          padding: 12px;
          box-sizing: border-box;
        }

        .participant-card h2 {
          margin: 0;
          font-size: 18px;
          line-height: 1.2;
          color: #1b2a41;
        }

        .participant-total {
          margin-top: 4px;
          margin-bottom: 10px;
          color: #324565;
          font-weight: 700;
          font-size: 13px;
        }

        .participant-section-title {
          margin: 10px 0 6px;
          font-size: 12px;
          text-transform: uppercase;
          letter-spacing: 0.05em;
          color: #4a5f83;
          font-weight: 700;
        }

        .participant-row {
          display: flex;
          justify-content: space-between;
          gap: 8px;
          padding: 7px 0;
          border-bottom: 1px solid #edf2fb;
          font-size: 13px;
        }

        .participant-row:last-child {
          border-bottom: none;
        }

        .participant-player {
          color: #132033;
        }

        .participant-player.empty {
          color: #8a93a3;
        }

        .participant-player.not-found {
          color: #9a2d2d;
        }

        .participant-points {
          font-weight: 700;
          color: #1b2a41;
          white-space: nowrap;
        }

        .participant-points.empty {
          color: #8a93a3;
        }

        .participant-points.not-found {
          color: #9a2d2d;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <nav class="top-nav" aria-label="Päänavigaatio">
        <a href="/" class="active">Lagen</a>
        <a href="/admin.html">Admin</a>
      </nav>

      <section class="hero">
        <h1>Lagen</h1>
        <div class="meta hidden">
          <div id="status"></div>
          <div id="summaryMeta"></div>
        </div>
      </section>

      <div class="table-wrap">
        <table>
          <thead id="head"></thead>
          <tbody id="body"></tbody>
        </table>
      </div>

      <section class="mobile-cards" aria-label="Deltagarkort">
        <div id="mobileCards" class="mobile-cards-track"></div>
      </section>
    </div>

    <script type="module" src="/tipsen.js"></script>
  </body>
</html>
